services:
  postgres:
    image: postgres:16
    container_name: hualala-postgres
    environment:
      POSTGRES_DB: hualala
      POSTGRES_USER: hualala
      POSTGRES_PASSWORD: hualala
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hualala -d hualala"]
      interval: 5s
      timeout: 5s
      retries: 10
