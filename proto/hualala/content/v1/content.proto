syntax = "proto3";

package hualala.content.v1;

option go_package = "github.com/hualala/apps/backend/gen/hualala/content/v1;contentv1";

import "google/protobuf/timestamp.proto";

service ContentService {
  rpc CreateScene(CreateSceneRequest) returns (CreateSceneResponse);
  rpc CreateShot(CreateShotRequest) returns (CreateShotResponse);
  rpc ListScenes(ListScenesRequest) returns (ListScenesResponse);
  rpc GetScene(GetSceneRequest) returns (GetSceneResponse);
  rpc ListSceneShots(ListSceneShotsRequest) returns (ListSceneShotsResponse);
  rpc GetShot(GetShotRequest) returns (GetShotResponse);
  rpc UpdateShotStructure(UpdateShotStructureRequest) returns (UpdateShotStructureResponse);
  rpc CreateContentSnapshot(CreateContentSnapshotRequest) returns (CreateContentSnapshotResponse);
  rpc CreateLocalizedSnapshot(CreateLocalizedSnapshotRequest) returns (CreateLocalizedSnapshotResponse);
  rpc GetCollaborationSession(GetCollaborationSessionRequest) returns (GetCollaborationSessionResponse);
  rpc UpsertCollaborationLease(UpsertCollaborationLeaseRequest) returns (UpsertCollaborationLeaseResponse);
  rpc ReleaseCollaborationLease(ReleaseCollaborationLeaseRequest) returns (ReleaseCollaborationLeaseResponse);
}

message Scene {
  string id = 1;
  string episode_id = 2;
  string code = 3;
  string title = 4;
  string source_locale = 5;
}

message Shot {
  string id = 1;
  string scene_id = 2;
  string code = 3;
  string title = 4;
  string source_locale = 5;
}

message ContentSnapshot {
  string id = 1;
  string owner_type = 2;
  string owner_id = 3;
  string locale = 4;
  string source_snapshot_id = 5;
  string translation_group_id = 6;
  string translation_status = 7;
  string body = 8;
  string snapshot_kind = 9;
}

message CollaborationPresence {
  string presence_id = 1;
  string session_id = 2;
  string user_id = 3;
  string status = 4;
  google.protobuf.Timestamp last_seen_at = 5;
  google.protobuf.Timestamp lease_expires_at = 6;
}

message CollaborationSession {
  string session_id = 1;
  string owner_type = 2;
  string owner_id = 3;
  uint32 draft_version = 4;
  string lock_holder_user_id = 5;
  google.protobuf.Timestamp lease_expires_at = 6;
  string conflict_summary = 7;
  repeated CollaborationPresence presences = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp updated_at = 10;
}

message CreateSceneRequest {
  string project_id = 1;
  string episode_id = 2;
  uint32 scene_number = 3;
  string title = 4;
}

message CreateSceneResponse {
  Scene scene = 1;
}

message CreateShotRequest {
  string scene_id = 1;
  uint32 shot_number = 2;
  string title = 3;
}

message CreateShotResponse {
  Shot shot = 1;
}

message ListScenesRequest {
  string project_id = 1;
  string episode_id = 2;
  string display_locale = 3;
}

message ListScenesResponse {
  repeated Scene scenes = 1;
}

message GetSceneRequest {
  string scene_id = 1;
  string display_locale = 2;
}

message GetSceneResponse {
  Scene scene = 1;
}

message ListSceneShotsRequest {
  string scene_id = 1;
  string display_locale = 2;
}

message ListSceneShotsResponse {
  repeated Shot shots = 1;
}

message GetShotRequest {
  string shot_id = 1;
  string display_locale = 2;
}

message GetShotResponse {
  Shot shot = 1;
}

message UpdateShotStructureRequest {
  string shot_id = 1;
  string title = 2;
  string content_locale = 3;
}

message UpdateShotStructureResponse {
  Shot shot = 1;
}

message CreateContentSnapshotRequest {
  string owner_type = 1;
  string owner_id = 2;
  string content_locale = 3;
  string body = 4;
  string snapshot_kind = 5;
}

message CreateContentSnapshotResponse {
  ContentSnapshot snapshot = 1;
}

message CreateLocalizedSnapshotRequest {
  string source_snapshot_id = 1;
  string content_locale = 2;
  string body = 3;
  string snapshot_kind = 4;
}

message CreateLocalizedSnapshotResponse {
  ContentSnapshot snapshot = 1;
}

message GetCollaborationSessionRequest {
  string owner_type = 1;
  string owner_id = 2;
}

message GetCollaborationSessionResponse {
  CollaborationSession session = 1;
}

message UpsertCollaborationLeaseRequest {
  string owner_type = 1;
  string owner_id = 2;
  string actor_user_id = 3;
  string presence_status = 4;
  uint32 draft_version = 5;
  uint32 lease_ttl_seconds = 6;
}

message UpsertCollaborationLeaseResponse {
  CollaborationSession session = 1;
}

message ReleaseCollaborationLeaseRequest {
  string owner_type = 1;
  string owner_id = 2;
  string actor_user_id = 3;
  string conflict_summary = 4;
}

message ReleaseCollaborationLeaseResponse {
  CollaborationSession session = 1;
}
