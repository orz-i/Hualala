syntax = "proto3";

package hualala.project.v1;

option go_package = "github.com/hualala/apps/backend/gen/hualala/project/v1;projectv1";

import "google/protobuf/timestamp.proto";

service ProjectService {
  rpc CreateProject(CreateProjectRequest) returns (CreateProjectResponse);
  rpc CreateEpisode(CreateEpisodeRequest) returns (CreateEpisodeResponse);
  rpc GetProject(GetProjectRequest) returns (GetProjectResponse);
  rpc ListProjects(ListProjectsRequest) returns (ListProjectsResponse);
  rpc ListEpisodes(ListEpisodesRequest) returns (ListEpisodesResponse);
  rpc GetPreviewWorkbench(GetPreviewWorkbenchRequest) returns (GetPreviewWorkbenchResponse);
  rpc UpsertPreviewAssembly(UpsertPreviewAssemblyRequest) returns (UpsertPreviewAssemblyResponse);
}

message Project {
  string project_id = 1;
  string org_id = 2;
  string title = 3;
  string status = 4;
}

message Episode {
  string episode_id = 1;
  string project_id = 2;
  string title = 3;
  uint32 episode_number = 4;
}

message PreviewAssemblyItem {
  string item_id = 1;
  string assembly_id = 2;
  string shot_id = 3;
  string primary_asset_id = 4;
  string source_run_id = 5;
  uint32 sequence = 6;
}

message PreviewAssembly {
  string assembly_id = 1;
  string project_id = 2;
  string episode_id = 3;
  string status = 4;
  repeated PreviewAssemblyItem items = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
}

message CreateProjectRequest {
  string org_id = 1;
  string title = 2;
  string owner_user_id = 3;
}

message CreateProjectResponse {
  Project project = 1;
}

message CreateEpisodeRequest {
  string project_id = 1;
  uint32 episode_number = 2;
  string title = 3;
}

message CreateEpisodeResponse {
  Episode episode = 1;
}

message GetProjectRequest {
  string project_id = 1;
}

message GetProjectResponse {
  Project project = 1;
}

message ListProjectsRequest {
  string org_id = 1;
}

message ListProjectsResponse {
  repeated Project projects = 1;
}

message ListEpisodesRequest {
  string project_id = 1;
}

message ListEpisodesResponse {
  repeated Episode episodes = 1;
}

message GetPreviewWorkbenchRequest {
  string project_id = 1;
  string episode_id = 2;
}

message GetPreviewWorkbenchResponse {
  PreviewAssembly assembly = 1;
}

message UpsertPreviewAssemblyRequest {
  string project_id = 1;
  string episode_id = 2;
  string status = 3;
  repeated PreviewAssemblyItem items = 4;
}

message UpsertPreviewAssemblyResponse {
  PreviewAssembly assembly = 1;
}
