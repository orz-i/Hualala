syntax = "proto3";

package hualala.project.v1;

option go_package = "github.com/hualala/apps/backend/gen/hualala/project/v1;projectv1";

service ProjectService {
  rpc CreateProject(CreateProjectRequest) returns (CreateProjectResponse);
  rpc GetProject(GetProjectRequest) returns (GetProjectResponse);
  rpc ListProjects(ListProjectsRequest) returns (ListProjectsResponse);
  rpc ListEpisodes(ListEpisodesRequest) returns (ListEpisodesResponse);
}

message Project {
  string project_id = 1;
  string org_id = 2;
  string title = 3;
  string status = 4;
}

message Episode {
  string episode_id = 1;
  string project_id = 2;
  string title = 3;
  uint32 episode_number = 4;
}

message CreateProjectRequest {
  string org_id = 1;
  string title = 2;
  string owner_user_id = 3;
}

message CreateProjectResponse {
  Project project = 1;
}

message GetProjectRequest {
  string project_id = 1;
}

message GetProjectResponse {
  Project project = 1;
}

message ListProjectsRequest {
  string org_id = 1;
}

message ListProjectsResponse {
  repeated Project projects = 1;
}

message ListEpisodesRequest {
  string project_id = 1;
}

message ListEpisodesResponse {
  repeated Episode episodes = 1;
}
