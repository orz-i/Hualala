syntax = "proto3";

package hualala.project.v1;

option go_package = "github.com/hualala/apps/backend/gen/hualala/project/v1;projectv1";

import "google/protobuf/timestamp.proto";

service ProjectService {
  rpc CreateProject(CreateProjectRequest) returns (CreateProjectResponse);
  rpc CreateEpisode(CreateEpisodeRequest) returns (CreateEpisodeResponse);
  rpc GetProject(GetProjectRequest) returns (GetProjectResponse);
  rpc ListProjects(ListProjectsRequest) returns (ListProjectsResponse);
  rpc ListEpisodes(ListEpisodesRequest) returns (ListEpisodesResponse);
  rpc GetPreviewWorkbench(GetPreviewWorkbenchRequest) returns (GetPreviewWorkbenchResponse);
  rpc ListPreviewShotOptions(ListPreviewShotOptionsRequest) returns (ListPreviewShotOptionsResponse);
  rpc UpsertPreviewAssembly(UpsertPreviewAssemblyRequest) returns (UpsertPreviewAssemblyResponse);
  rpc GetAudioWorkbench(GetAudioWorkbenchRequest) returns (GetAudioWorkbenchResponse);
  rpc UpsertAudioTimeline(UpsertAudioTimelineRequest) returns (UpsertAudioTimelineResponse);
}

message Project {
  string project_id = 1;
  string org_id = 2;
  string title = 3;
  string status = 4;
}

message Episode {
  string episode_id = 1;
  string project_id = 2;
  string title = 3;
  uint32 episode_number = 4;
}

message PreviewAssemblyItem {
  string item_id = 1;
  string assembly_id = 2;
  string shot_id = 3;
  string primary_asset_id = 4;
  string source_run_id = 5;
  uint32 sequence = 6;
  PreviewShotSummary shot = 7;
  PreviewAssetSummary primary_asset = 8;
  PreviewRunSummary source_run = 9;
}

message PreviewAssembly {
  string assembly_id = 1;
  string project_id = 2;
  string episode_id = 3;
  string status = 4;
  repeated PreviewAssemblyItem items = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
}

message PreviewShotSummary {
  string project_id = 1;
  string project_title = 2;
  string episode_id = 3;
  string episode_title = 4;
  string scene_id = 5;
  string scene_code = 6;
  string scene_title = 7;
  string shot_id = 8;
  string shot_code = 9;
  string shot_title = 10;
}

message PreviewAssetSummary {
  string asset_id = 1;
  string media_type = 2;
  string rights_status = 3;
  bool ai_annotated = 4;
}

message PreviewRunSummary {
  string run_id = 1;
  string status = 2;
  string trigger_type = 3;
}

message PreviewShotOption {
  PreviewShotSummary shot = 1;
  string shot_execution_id = 2;
  string shot_execution_status = 3;
  PreviewAssetSummary current_primary_asset = 4;
  PreviewRunSummary latest_run = 5;
}

message AudioClip {
  string clip_id = 1;
  string track_id = 2;
  string asset_id = 3;
  string source_run_id = 4;
  uint32 sequence = 5;
  uint32 start_ms = 6;
  uint32 duration_ms = 7;
  uint32 trim_in_ms = 8;
  uint32 trim_out_ms = 9;
}

message AudioTrack {
  string track_id = 1;
  string timeline_id = 2;
  string track_type = 3;
  string display_name = 4;
  uint32 sequence = 5;
  bool muted = 6;
  bool solo = 7;
  uint32 volume_percent = 8;
  repeated AudioClip clips = 9;
}

message AudioTimeline {
  string audio_timeline_id = 1;
  string project_id = 2;
  string episode_id = 3;
  string status = 4;
  string render_workflow_run_id = 5;
  string render_status = 6;
  repeated AudioTrack tracks = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
}

message CreateProjectRequest {
  string org_id = 1;
  string title = 2;
  string owner_user_id = 3;
}

message CreateProjectResponse {
  Project project = 1;
}

message CreateEpisodeRequest {
  string project_id = 1;
  uint32 episode_number = 2;
  string title = 3;
}

message CreateEpisodeResponse {
  Episode episode = 1;
}

message GetProjectRequest {
  string project_id = 1;
}

message GetProjectResponse {
  Project project = 1;
}

message ListProjectsRequest {
  string org_id = 1;
}

message ListProjectsResponse {
  repeated Project projects = 1;
}

message ListEpisodesRequest {
  string project_id = 1;
}

message ListEpisodesResponse {
  repeated Episode episodes = 1;
}

message GetPreviewWorkbenchRequest {
  string project_id = 1;
  string episode_id = 2;
}

message GetPreviewWorkbenchResponse {
  PreviewAssembly assembly = 1;
}

message ListPreviewShotOptionsRequest {
  string project_id = 1;
  string episode_id = 2;
}

message ListPreviewShotOptionsResponse {
  repeated PreviewShotOption options = 1;
}

message UpsertPreviewAssemblyRequest {
  string project_id = 1;
  string episode_id = 2;
  string status = 3;
  repeated PreviewAssemblyItem items = 4;
}

message UpsertPreviewAssemblyResponse {
  PreviewAssembly assembly = 1;
}

message GetAudioWorkbenchRequest {
  string project_id = 1;
  string episode_id = 2;
}

message GetAudioWorkbenchResponse {
  AudioTimeline timeline = 1;
}

message UpsertAudioTimelineRequest {
  string project_id = 1;
  string episode_id = 2;
  string status = 3;
  string render_workflow_run_id = 4;
  string render_status = 5;
  repeated AudioTrack tracks = 6;
}

message UpsertAudioTimelineResponse {
  AudioTimeline timeline = 1;
}
