syntax = "proto3";

package hualala.org.v1;

option go_package = "github.com/hualala/apps/backend/gen/hualala/org/v1;orgv1";

service OrgService {
  rpc ListMembers(ListMembersRequest) returns (ListMembersResponse);
  rpc ListRoles(ListRolesRequest) returns (ListRolesResponse);
  rpc GetOrgLocaleSettings(GetOrgLocaleSettingsRequest) returns (GetOrgLocaleSettingsResponse);
  rpc ListAvailablePermissions(ListAvailablePermissionsRequest) returns (ListAvailablePermissionsResponse);
  rpc CreateRole(CreateRoleRequest) returns (CreateRoleResponse);
  rpc UpdateRole(UpdateRoleRequest) returns (UpdateRoleResponse);
  rpc DeleteRole(DeleteRoleRequest) returns (DeleteRoleResponse);
  rpc UpdateMemberRole(UpdateMemberRoleRequest) returns (UpdateMemberRoleResponse);
  rpc UpdateOrgLocaleSettings(UpdateOrgLocaleSettingsRequest) returns (UpdateOrgLocaleSettingsResponse);
}

message Member {
  string member_id = 1;
  string org_id = 2;
  string user_id = 3;
  string role_id = 4;
}

message Role {
  string role_id = 1;
  string org_id = 2;
  string code = 3;
  string display_name = 4;
  repeated string permission_codes = 5;
}

message AvailablePermission {
  string code = 1;
  string display_name = 2;
  string group = 3;
}

message OrgLocaleSettings {
  string org_id = 1;
  string default_locale = 2;
  repeated string supported_locales = 3;
}

message ListMembersRequest {
  string org_id = 1;
}

message ListMembersResponse {
  repeated Member members = 1;
}

message ListRolesRequest {
  string org_id = 1;
}

message ListRolesResponse {
  repeated Role roles = 1;
}

message GetOrgLocaleSettingsRequest {
  string org_id = 1;
}

message GetOrgLocaleSettingsResponse {
  OrgLocaleSettings locale_settings = 1;
}

message ListAvailablePermissionsRequest {
  string org_id = 1;
}

message ListAvailablePermissionsResponse {
  repeated AvailablePermission permissions = 1;
}

message CreateRoleRequest {
  string org_id = 1;
  string code = 2;
  string display_name = 3;
  repeated string permission_codes = 4;
}

message CreateRoleResponse {
  Role role = 1;
}

message UpdateRoleRequest {
  string org_id = 1;
  string role_id = 2;
  string display_name = 3;
  repeated string permission_codes = 4;
}

message UpdateRoleResponse {
  Role role = 1;
}

message DeleteRoleRequest {
  string org_id = 1;
  string role_id = 2;
}

message DeleteRoleResponse {}

message UpdateMemberRoleRequest {
  string org_id = 1;
  string member_id = 2;
  string role_id = 3;
}

message UpdateMemberRoleResponse {
  Member member = 1;
}

message UpdateOrgLocaleSettingsRequest {
  string org_id = 1;
  string default_locale = 2;
  repeated string supported_locales = 3;
}

message UpdateOrgLocaleSettingsResponse {
  OrgLocaleSettings locale_settings = 1;
}
