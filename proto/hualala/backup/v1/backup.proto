syntax = "proto3";

package hualala.backup.v1;

option go_package = "github.com/hualala/apps/backend/gen/hualala/backup/v1;backupv1";

import "google/protobuf/timestamp.proto";

service BackupService {
  rpc CreateBackupPackage(CreateBackupPackageRequest) returns (CreateBackupPackageResponse);
  rpc ListBackupPackages(ListBackupPackagesRequest) returns (ListBackupPackagesResponse);
  rpc GetBackupPackage(GetBackupPackageRequest) returns (GetBackupPackageResponse);
  rpc PreflightRestoreBackupPackage(PreflightRestoreBackupPackageRequest) returns (PreflightRestoreBackupPackageResponse);
  rpc ApplyBackupPackage(ApplyBackupPackageRequest) returns (ApplyBackupPackageResponse);
}

message BackupSummary {
  repeated string org_ids = 1;
  repeated string project_ids = 2;
  map<string, int32> counts = 3;
  int64 payload_bytes = 4;
}

message BackupPackage {
  string package_id = 1;
  string schema_version = 2;
  string restore_mode = 3;
  google.protobuf.Timestamp created_at = 4;
  string created_by_user_id = 5;
  BackupSummary summary = 6;
}

message CreateBackupPackageRequest {
  string org_id = 1;
}

message CreateBackupPackageResponse {
  BackupPackage backup_package = 1;
}

message ListBackupPackagesRequest {
  string org_id = 1;
}

message ListBackupPackagesResponse {
  repeated BackupPackage backup_packages = 1;
}

message GetBackupPackageRequest {
  string org_id = 1;
  string package_id = 2;
}

message GetBackupPackageResponse {
  BackupPackage backup_package = 1;
  string package_json = 2;
}

message PreflightRestoreBackupPackageRequest {
  string org_id = 1;
  string package_id = 2;
}

message PreflightRestoreBackupPackageResponse {
  BackupSummary package_summary = 1;
  BackupSummary current_summary = 2;
  repeated string warnings = 3;
  bool destructive = 4;
}

message ApplyBackupPackageRequest {
  string org_id = 1;
  string package_id = 2;
  bool confirm_replace_runtime = 3;
}

message ApplyBackupPackageResponse {
  BackupPackage backup_package = 1;
}
