name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  proto_frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/backend/go.mod

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Proto lint
        run: node tooling/scripts/run-buf.mjs lint

      - name: Buf breaking
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1
          if git ls-tree -r --name-only "origin/${{ github.base_ref }}" -- proto | grep -E '\.proto$' > /dev/null; then
            node tooling/scripts/run-buf.mjs breaking --against ".git#branch=origin/${{ github.base_ref }}"
          else
            echo "Skipping buf breaking: origin/${{ github.base_ref }} has no .proto files"
          fi

      - name: I18n parity
        run: corepack pnpm run i18n:check

      - name: Tooling tests
        run: corepack pnpm run test:tooling

      - name: Frontend lint
        run: corepack pnpm run lint

      - name: Frontend build
        run: corepack pnpm run build

      - name: Frontend test
        run: corepack pnpm run test

  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: hualala
          POSTGRES_PASSWORD: hualala
          POSTGRES_DB: hualala
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hualala -d hualala"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DB_DRIVER: postgres
      DATABASE_URL: postgres://hualala:hualala@127.0.0.1:5432/hualala?sslmode=disable
      AUTO_MIGRATE: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/backend/go.mod

      - name: Run migrations
        run: go run ./apps/backend/cmd/migrate

      - name: Backend test
        run: go test ./apps/backend/...

  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: corepack pnpm exec playwright install chromium

      - name: Build demo seed
        run: corepack pnpm run demo:seed

      - name: Admin smoke
        run: corepack pnpm run test:e2e:admin

      - name: Creator smoke
        run: corepack pnpm run test:e2e:creator

      - name: Phase1 acceptance
        run: corepack pnpm run test:e2e:phase1

  e2e_real:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: hualala
          POSTGRES_PASSWORD: hualala
          POSTGRES_DB: hualala
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hualala -d hualala"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DB_DRIVER: postgres
      DATABASE_URL: postgres://hualala:hualala@127.0.0.1:5432/hualala?sslmode=disable
      AUTO_MIGRATE: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: corepack pnpm exec playwright install chromium

      - name: Run migrations
        run: corepack pnpm run db:migrate

      - name: Phase1 real acceptance
        run: corepack pnpm run test:e2e:phase1:real
