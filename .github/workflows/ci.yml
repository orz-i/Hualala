name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  proto_frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Proto lint
        run: node tooling/scripts/run-buf.mjs lint

      - name: Buf breaking
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1
          node tooling/scripts/run-buf.mjs breaking --against ".git#branch=origin/${{ github.base_ref }}"

      - name: I18n parity
        run: corepack pnpm run i18n:check

      - name: Tooling tests
        run: corepack pnpm run test:tooling

      - name: Frontend lint
        run: corepack pnpm run lint

      - name: Frontend build
        run: corepack pnpm run build

      - name: Frontend test
        run: corepack pnpm run test

  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/backend/go.mod

      - name: Backend test
        run: go test ./apps/backend/...

  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: corepack pnpm exec playwright install chromium

      - name: Build demo seed
        run: corepack pnpm run demo:seed

      - name: Admin smoke
        run: corepack pnpm run test:e2e:admin

      - name: Creator smoke
        run: corepack pnpm run test:e2e:creator

      - name: Phase1 acceptance
        run: corepack pnpm run test:e2e:phase1
